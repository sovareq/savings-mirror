<!doctype html>
<html><head>
<meta charset="utf-8">
<title>caveman-dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:13px;line-height:1.5;background:#fff;color:#000;padding:24px;max-width:780px}
  @media (prefers-color-scheme:dark){body{background:#000;color:#fff}}
  h1{font-size:13px;font-weight:600;margin-bottom:24px;border-bottom:1px solid currentColor;padding-bottom:8px}
  h1 .dot{display:inline-block;width:8px;height:8px;background:#0a0;border-radius:50%;margin-right:6px;vertical-align:middle}
  section{margin-bottom:24px}
  section h2{font-size:13px;font-weight:600;margin-bottom:8px;text-transform:lowercase}
  table{width:100%;border-collapse:collapse}
  td,th{text-align:left;padding:2px 8px 2px 0;vertical-align:top}
  td.num{font-variant-numeric:tabular-nums;text-align:right}
  .muted{opacity:0.5}
  .sep{border-top:1px dashed currentColor;margin:16px 0}
  button{font:inherit;color:inherit;background:transparent;border:1px solid currentColor;padding:4px 8px;cursor:pointer}
  button:hover{background:currentColor;color:#fff}
  @media (prefers-color-scheme:dark){button:hover{color:#000}}
  button.off{opacity:0.4}
  button:disabled{cursor:not-allowed;opacity:0.3}
  a{color:inherit}
</style>
</head><body>

<h1><span class="dot"></span>caveman-dashboard &middot; <span class="muted" id="status">loading</span></h1>

<section id="caveman-section">
  <h2>caveman</h2>
  <table id="caveman-table"></table>
</section>

<section id="sovacount-section" style="display:none">
  <h2>+ sovacount</h2>
  <table id="sovacount-table"></table>
</section>

<section id="combined-section" style="display:none">
  <h2>combined</h2>
  <table id="combined-table"></table>
</section>

<div class="sep"></div>

<button id="toggle" class="off">+ show sovacount</button>
<span class="muted" style="margin-left:12px" id="sovacount-status"></span>

<div class="sep"></div>
<p class="muted">
  caveman by <a href="https://github.com/JuliusBrussee/caveman">@JuliusBrussee</a>
  &middot; dashboard MIT &middot; read-only &middot; localhost
</p>

<script>
let showSova = false;

function fmt(v){ return v==null ? "—" : ("$" + v.toFixed(4)); }
function fmtPct(v){ return v==null ? "—" : (v.toFixed(1) + "%"); }
function fmtN(v){ return v==null ? "—" : v.toString(); }

function renderBucket(table, label, b){
  if (!b) return;
  const tr = document.createElement("tr");
  tr.innerHTML = `<td>${label}</td>
    <td class="num">${fmtN(b.calls)} calls</td>
    <td class="num">${fmt(b.baseline_usd)} baseline</td>
    <td class="num">${fmt(b.actual_usd)} actual</td>
    <td class="num">saved ${fmt(b.savings_usd)}</td>
    <td class="num">${fmtPct(b.savings_pct)}</td>`;
  table.appendChild(tr);
}

async function refresh(){
  try {
    const r = await fetch("/api/combined");
    const d = await r.json();

    const ct = document.getElementById("caveman-table");
    ct.innerHTML = "";
    if (d.caveman) {
      renderBucket(ct, "today",      d.caveman.today);
      renderBucket(ct, "7d",         d.caveman.last_7d);
      renderBucket(ct, "cumulative", d.caveman.cumulative);
    }

    const sovaOk = d.sovacount != null;
    const btn = document.getElementById("toggle");
    btn.disabled = !sovaOk;
    document.getElementById("sovacount-status").textContent = sovaOk ? "" : "(sovacount unreachable on :8989)";

    if (showSova && sovaOk) {
      document.getElementById("sovacount-section").style.display = "block";
      document.getElementById("combined-section").style.display = "block";
      const st = document.getElementById("sovacount-table");
      st.innerHTML = "";
      renderBucket(st, "today",      d.sovacount.today);
      renderBucket(st, "cumulative", d.sovacount.cumulative);

      const cb = document.getElementById("combined-table");
      cb.innerHTML = "";
      renderBucket(cb, "all sources", d.combined);
    } else {
      document.getElementById("sovacount-section").style.display = "none";
      document.getElementById("combined-section").style.display = "none";
    }

    document.getElementById("status").textContent = "live";
  } catch(e) {
    document.getElementById("status").textContent = "error";
  }
}

document.getElementById("toggle").addEventListener("click", () => {
  showSova = !showSova;
  const btn = document.getElementById("toggle");
  btn.textContent = showSova ? "- hide sovacount" : "+ show sovacount";
  btn.classList.toggle("off", !showSova);
  refresh();
});

refresh();
setInterval(refresh, 2000);
</script>
</body></html>
